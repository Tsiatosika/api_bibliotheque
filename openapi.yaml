openapi: '3.0.3'
info:
  title: API Bibliothèque
  version: '1.0.0'
  description: API REST de gestion d'une bibliothèque — Cours 2026

servers:
  - url: http://localhost:8000/api/v1
    description: Serveur de développement
  - url: https://api.mabibliotheque.com/v1
    description: Serveur de production

# ─── SÉCURITÉ ────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─── SCHÉMAS ───────────────────────────────────────────────────
  schemas:

    Author:
      type: object
      properties:
        id:          { type: integer, example: 1 }
        first_name:  { type: string,  example: Robert }
        last_name:   { type: string,  example: Martin }
        nationality: { type: string,  example: Américain }

    Book:
      type: object
      properties:
        id:        { type: integer, example: 1 }
        title:     { type: string,  example: Clean Code }
        isbn:      { type: string,  example: '978-0132350884' }
        year:      { type: integer, example: 2008 }
        available: { type: boolean, example: true }
        author:    { $ref: '#/components/schemas/Author' }

    Borrow:
      type: object
      properties:
        id:          { type: integer, example: 1 }
        user_name:   { type: string,  example: Alice }
        book_id:     { type: integer, example: 1 }
        borrowed_at: { type: string, format: date-time }
        returned_at: { type: string, format: date-time, nullable: true }

    # ─── INPUT TYPES ─────────────────────────────────────────────

    CreateAuthorInput:
      type: object
      required: [first_name, last_name]
      properties:
        first_name:  { type: string, example: Robert }
        last_name:   { type: string, example: Martin }
        nationality: { type: string, example: Américain }

    UpdateAuthorInput:
      type: object
      properties:
        first_name:  { type: string }
        last_name:   { type: string }
        nationality: { type: string }

    CreateBookInput:
      type: object
      required: [title, isbn, year, author_id]
      properties:
        title:     { type: string,  example: Clean Code }
        isbn:      { type: string,  example: '978-0132350884' }
        year:      { type: integer, example: 2008 }
        author_id: { type: integer, example: 1 }

    UpdateBookInput:
      type: object
      properties:
        title:     { type: string }
        isbn:      { type: string }
        year:      { type: integer }
        available: { type: boolean }
        author_id: { type: integer }

    BorrowInput:
      type: object
      required: [user_name, book_id]
      properties:
        user_name: { type: string,  example: Alice }
        book_id:   { type: integer, example: 1 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email, example: admin@biblio.com }
        password: { type: string, example: password123 }

    AuthPayload:
      type: object
      properties:
        token: { type: string, example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... }
        user:
          type: object
          properties:
            id:    { type: integer }
            name:  { type: string }
            email: { type: string }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string,  example: Validation échouée }
        errors:  { type: object }

# ─── ENDPOINTS ───────────────────────────────────────────────────
paths:

  # ── AUTH ────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Authentification]
      summary: Connexion utilisateur
      description: Retourne un token JWT à utiliser dans les routes protégées
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginInput' }
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:    { $ref: '#/components/schemas/AuthPayload' }
                  message: { type: string, example: Connexion réussie }
        '401':
          description: Identifiants incorrects
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── AUTHORS ─────────────────────────────────────────────────────
  /authors:
    get:
      tags: [Authors]
      summary: Liste tous les auteurs
      responses:
        '200':
          description: Liste retournée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Author' }
                  message: { type: string }

    post:
      tags: [Authors]
      summary: Créer un auteur
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAuthorInput' }
      responses:
        '201':
          description: Auteur créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:    { $ref: '#/components/schemas/Author' }
                  message: { type: string }
        '401': { description: Non authentifié }
        '422':
          description: Validation échouée
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /authors/{id}:
    get:
      tags: [Authors]
      summary: Détails d'un auteur avec ses livres
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Auteur trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { $ref: '#/components/schemas/Author' }
                  message: { type: string }
        '404':
          description: Auteur introuvable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    put:
      tags: [Authors]
      summary: Modifier un auteur
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAuthorInput' }
      responses:
        '200': { description: Auteur modifié }
        '401': { description: Non authentifié }
        '404': { description: Auteur introuvable }

    delete:
      tags: [Authors]
      summary: Supprimer un auteur
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Auteur supprimé }
        '401': { description: Non authentifié }
        '404': { description: Auteur introuvable }

  # ── BOOKS ────────────────────────────────────────────────────────
  /books:
    get:
      tags: [Books]
      summary: Liste les livres
      parameters:
        - name: available
          in: query
          schema: { type: boolean }
          description: Filtrer par disponibilité
      responses:
        '200':
          description: Liste retournée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Book' }
                  message: { type: string }

    post:
      tags: [Books]
      summary: Ajouter un livre
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBookInput' }
      responses:
        '201': { description: Livre créé }
        '401': { description: Non authentifié }
        '422':
          description: Validation échouée
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /books/{id}:
    get:
      tags: [Books]
      summary: Détails d'un livre avec son auteur
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Livre trouvé }
        '404':
          description: Livre introuvable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    put:
      tags: [Books]
      summary: Modifier un livre
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBookInput' }
      responses:
        '200': { description: Livre modifié }
        '401': { description: Non authentifié }
        '404': { description: Livre introuvable }

    delete:
      tags: [Books]
      summary: Supprimer un livre
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Livre supprimé }
        '401': { description: Non authentifié }
        '404': { description: Livre introuvable }

  # ── BORROWS ──────────────────────────────────────────────────────
  /borrows:
    get:
      tags: [Borrows]
      summary: Liste tous les emprunts en cours
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Liste des emprunts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Borrow' }
                  message: { type: string }
        '401': { description: Non authentifié }

    post:
      tags: [Borrows]
      summary: Enregistrer un emprunt
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowInput' }
      responses:
        '201': { description: Emprunt enregistré }
        '401': { description: Non authentifié }
        '404': { description: Livre introuvable }
        '422': { description: Livre non disponible }

  /borrows/{id}/return:
    patch:
      tags: [Borrows]
      summary: Marquer un livre comme rendu
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Livre retourné }
        '401': { description: Non authentifié }
        '404': { description: Emprunt introuvable }
        '422': { description: Livre déjà retourné } 